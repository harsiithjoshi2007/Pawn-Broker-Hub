kind = "mobile"
previewPath = "/mobile/"
title = "Pawn Broker Mobile"
version = "1.0.0"
id = "artifacts/pawn-broker-mobile"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/mobile/" ]
localPort = 21259

[services.development]
run = "pnpm --filter @workspace/pawn-broker-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pawn-broker-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/pawn-broker-mobile", "run", "serve" ]

[services.env]
PORT = "21259"
BASE_PATH = "/mobile/"
